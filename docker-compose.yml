# Parametryzowany stack — ten sam plik uruchamia DWA izolowane środowiska
# (prod i dev) na jednej maszynie. Różnicują je tylko zmienne z pliku ./.env
# (COMPOSE_PROJECT_NAME, porty, nazwa bazy) oraz ./.env.docker (env Laravela).
#
#   prod:  COMPOSE_PROJECT_NAME=edsprod  APP_HTTP_PORT=8080  DB_HOST_PORT=3307  MYSQL_DATABASE=app
#   dev:   COMPOSE_PROJECT_NAME=edsdev   APP_HTTP_PORT=8081  DB_HOST_PORT=3308  MYSQL_DATABASE=app_dev
#
# Compose prefiksuje nazwy kontenerów/wolumenów/sieci nazwą projektu, więc oba
# stacki są w pełni odseparowane. Porty hosta bindujemy do 127.0.0.1 — ruch z
# internetu wchodzi WYŁĄCZNIE przez nginx hosta (reverse proxy + TLS).

services:
  # ───────────────────────────────────────────────
  # Baza danych (osobna instancja per środowisko)
  # ───────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-app}
    ports:
      - "127.0.0.1:${DB_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ───────────────────────────────────────────────
  # Migracje Laravel (uruchamiane raz przy starcie)
  # ───────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-eds}-app:local
    restart: "no"
    working_dir: /var/www/html
    command: php artisan migrate --force --no-interaction
    volumes:
      - ./backend:/var/www/html
      - laravel_storage:/var/www/html/storage
      - laravel_cache:/var/www/html/bootstrap/cache
    env_file:
      - ./.env.docker
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  # ───────────────────────────────────────────────
  # PHP + FPM (główna aplikacja)
  # ───────────────────────────────────────────────
  php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-eds}-app:local
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - laravel_storage:/var/www/html/storage        # NAMED VOLUME
      - laravel_cache:/var/www/html/bootstrap/cache   # NAMED VOLUME
    env_file:
      - ./.env.docker
    depends_on:
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - app-network

  # ───────────────────────────────────────────────
  # Nginx (webserver kontenera) — tylko na 127.0.0.1
  # ───────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_HTTP_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - laravel_storage:/var/www/html/storage        # NAMED VOLUME (publiczne pliki)
    depends_on:
      - php
    networks:
      - app-network

  # ───────────────────────────────────────────────
  # Worker / Queue
  # ───────────────────────────────────────────────
  queue:
    image: ${COMPOSE_PROJECT_NAME:-eds}-app:local
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --timeout=120 --sleep=3
    volumes:
      - ./backend:/var/www/html
      - laravel_storage:/var/www/html/storage
      - laravel_cache:/var/www/html/bootstrap/cache
    env_file:
      - ./.env.docker
    depends_on:
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      php:
        condition: service_started
    networks:
      - app-network

  # ───────────────────────────────────────────────
  # Scheduler
  # ───────────────────────────────────────────────
  scheduler:
    image: ${COMPOSE_PROJECT_NAME:-eds}-app:local
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work --verbose --no-interaction
    volumes:
      - ./backend:/var/www/html
      - laravel_storage:/var/www/html/storage
      - laravel_cache:/var/www/html/bootstrap/cache
    env_file:
      - ./.env.docker
    depends_on:
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      php:
        condition: service_started
    networks:
      - app-network

# ───────────────────────────────────────────────
# WOLUMENY (prefiksowane nazwą projektu → izolacja per środowisko)
# ───────────────────────────────────────────────
volumes:
  mysql_data:
  laravel_storage:
  laravel_cache:

networks:
  app-network:
    driver: bridge
