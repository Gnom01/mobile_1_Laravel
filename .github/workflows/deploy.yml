name: Deploy (dev)

on:
  push:
    branches: ["dev"]

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          debug: true
          script: |
            set -euo pipefail

            cd "${{ secrets.DEPLOY_PATH }}"

            dc() {
              docker compose --env-file .env "$@"
            }

            set_env_value() {
              local file="$1"
              local key="$2"
              local value="$3"

              if grep -q "^${key}=" "$file"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$file"
              else
                printf '\n%s=%s\n' "$key" "$value" >> "$file"
              fi
            }

            # ==========================================
            # ETAP 1: Ochrona plików środowiskowych na VPS
            # ==========================================
            # Skrypt NIE nadpisuje plików, jeśli już istnieją na serwerze!
            
            if [ ! -f .env ]; then
              echo "Brak pliku .env! Tworzę z losowymi bezpiecznymi hasłami..."
              DB_PASS=$(openssl rand -hex 16)
              DB_ROOT_PASS=$(openssl rand -hex 20)
              cat > .env <<EOF
            COMPOSE_PROJECT_NAME=edsdev
            APP_HTTP_PORT=8081
            DB_HOST_PORT=3308
            MYSQL_DATABASE=app_dev
            MYSQL_USER=app
            MYSQL_PASSWORD=$DB_PASS
            MYSQL_ROOT_PASSWORD=$DB_ROOT_PASS
            EOF
            fi

            if [ ! -f .env.docker ]; then
              echo "Brak pliku .env.docker! Tworzę z domyślnymi wartościami..."
              touch .env.docker
              set_env_value .env.docker APP_ENV local
              set_env_value .env.docker APP_DEBUG true
              set_env_value .env.docker APP_URL https://dev-api.egurrola-app.pl
              set_env_value .env.docker DB_CONNECTION mysql
              set_env_value .env.docker DB_HOST mysql
              set_env_value .env.docker DB_PORT 3306
              set_env_value .env.docker DB_DATABASE app_dev
              set_env_value .env.docker DB_USERNAME app
              
              # Pobierz wygenerowane hasło z pliku .env
              DB_PASS_FROM_ENV=$(grep "^MYSQL_PASSWORD=" .env | cut -d'=' -f2)
              set_env_value .env.docker DB_PASSWORD "$DB_PASS_FROM_ENV"
            fi

            # Remove leftovers from the old broken project name, if present.
            docker compose -p mobile_1_laravel down || true

            # Stop the dev stack before updating. Volumes are kept.
            dc down || true

            echo "Cleaning up leftovers..."
            sudo rm -rf backend/storage/framework/views/* || true
            sudo rm -rf backend/storage/logs/* || true
            sudo rm -rf backend/bootstrap/cache/*.php || true
            sudo chown -R ubuntu:ubuntu backend/storage backend/bootstrap/cache || true

            echo "Updating code via Git..."
            git fetch origin
            git reset --hard origin/dev

            echo "Configuring environment files..."
            # Wgrywamy Laravelowi chroniony plik ze środowiska Dockerowego
            cp .env.docker backend/.env

            echo "Building application image..."
            dc build php migrate

            echo "Starting database..."
            dc up -d mysql

            echo "Waiting for database..."
            for i in $(seq 1 60); do
              if dc exec -T mysql sh -lc 'mysqladmin ping -h localhost -u root --password="$MYSQL_ROOT_PASSWORD" --silent'; then
                break
              fi

              if [ "$i" -eq 60 ]; then
                echo "Database did not become ready in time"
                dc logs mysql
                exit 1
              fi

              sleep 2
            done

            echo "Ensuring dev database and user..."
            if ! dc exec -T mysql sh -lc 'mysql -u"$MYSQL_USER" --password="$MYSQL_PASSWORD" "$MYSQL_DATABASE" -e "SELECT 1" >/dev/null 2>&1'; then
              echo "Dev MySQL volume has incompatible app credentials. Recreating DEV database volume only..."
              dc down
              docker volume rm edsdev_mysql_data || true
              dc up -d mysql

              echo "Waiting for recreated database app user..."
              for i in $(seq 1 60); do
                if dc exec -T mysql sh -lc 'mysql -u"$MYSQL_USER" --password="$MYSQL_PASSWORD" "$MYSQL_DATABASE" -e "SELECT 1" >/dev/null 2>&1'; then
                  break
                fi

                if [ "$i" -eq 60 ]; then
                  echo "Recreated database app user did not become ready in time"
                  dc logs mysql
                  exit 1
                fi

                sleep 2
              done
            else
              echo "App user can access dev database."
            fi

            echo "Assigning permissions inside volumes..."
            dc run --rm --no-deps -u root php sh -lc 'mkdir -p storage/logs storage/framework/cache/data storage/framework/sessions storage/framework/views storage/framework/testing bootstrap/cache && chown -R www-data:www-data storage bootstrap/cache && chmod -R 775 storage bootstrap/cache'

            echo "Running Laravel tasks..."
            dc run --rm --no-deps php composer install --no-dev --optimize-autoloader
            dc run --rm --no-deps php sh -lc 'grep -q "^APP_KEY=base64:" .env || php artisan key:generate --force'

            echo "Running database migrations..."
            dc run --rm --no-deps php php artisan migrate --force

            dc run --rm --no-deps php php artisan optimize:clear
            dc run --rm --no-deps php php artisan config:cache
            dc run --rm --no-deps php php artisan route:cache
            dc run --rm --no-deps php php artisan view:cache

            echo "Starting application services..."
            dc up -d --no-deps php nginx queue scheduler

            echo "Restarting queue and scheduler..."
            dc restart queue scheduler

            echo "----------------------------------------"
            echo "DEPLOY SUCCESSFUL!"
            echo "----------------------------------------"
