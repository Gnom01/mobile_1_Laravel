name: Deploy (dev)

on:
  push:
    branches: ["dev"]

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          debug: true
          script: |
            set -euo pipefail

            cd "${{ secrets.DEPLOY_PATH }}"

            write_compose_env() {
              cat > .env <<'EOF'
            COMPOSE_PROJECT_NAME=edsdev
            APP_HTTP_PORT=8081
            DB_HOST_PORT=3308
            MYSQL_DATABASE=app_dev
            MYSQL_USER=app
            MYSQL_PASSWORD=app
            MYSQL_ROOT_PASSWORD=app
            EOF
            }

            dc() {
              docker compose --env-file .env "$@"
            }

            # .env is only for Docker Compose. Laravel settings stay in .env.docker.
            write_compose_env

            # Remove leftovers from the old broken project name, if present.
            docker compose -p mobile_1_laravel down || true

            # Stop the dev stack before updating. Volumes are kept.
            dc down || true

            echo "Cleaning up leftovers..."
            sudo rm -rf backend/storage/framework/views/* || true
            sudo rm -rf backend/storage/logs/* || true
            sudo rm -rf backend/bootstrap/cache/*.php || true
            sudo chown -R ubuntu:ubuntu backend/storage backend/bootstrap/cache || true

            echo "Updating code via Git..."
            git fetch origin
            git reset --hard origin/dev

            echo "Configuring environment files..."
            write_compose_env

            if [ ! -f .env.docker ]; then
              if [ -f backend/.env.docker ]; then
                cp backend/.env.docker .env.docker
              elif [ -f backend/.env.docker.example ]; then
                cp backend/.env.docker.example .env.docker
              fi
            fi

            if [ ! -f backend/.env ]; then
              cp .env.docker backend/.env || true
            fi

            echo "Building and starting containers..."
            dc up -d --build

            echo "Assigning permissions inside volumes..."
            dc exec -T php mkdir -p storage/logs storage/framework/cache/data storage/framework/sessions storage/framework/views storage/framework/testing bootstrap/cache
            dc exec -T php chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache
            dc exec -T php chmod -R 775 /var/www/html/storage /var/www/html/bootstrap/cache

            echo "Running Laravel tasks..."
            dc exec -T php composer install --no-dev --optimize-autoloader

            echo "Running database migrations..."
            dc exec -T php php artisan migrate --force

            dc exec -T php sh -lc 'grep -q "^APP_KEY=base64:" .env || php artisan key:generate --force'

            dc exec -T php php artisan optimize:clear
            dc exec -T php php artisan config:cache
            dc exec -T php php artisan route:cache
            dc exec -T php php artisan view:cache

            echo "Restarting queue and scheduler..."
            dc restart queue scheduler

            echo "----------------------------------------"
            echo "DEPLOY SUCCESSFUL!"
            echo "----------------------------------------"
